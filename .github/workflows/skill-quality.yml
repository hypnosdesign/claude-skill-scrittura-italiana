name: Skill quality

# Controlli deterministici della skill: zero chiamate LLM, costo nullo, nessun flake.

on:
  pull_request:
    paths:
      - "SKILL.md"
      - "references/**"
      - "evals/**"
      - "build-single-file.py"
      - "scrittura-italiana-single-file.md"
      - "scripts/check-description.mjs"
      - ".github/workflows/skill-quality.yml"
  push:
    branches: [main]
    paths:
      - "SKILL.md"
      - "references/**"
      - "evals/**"
      - "build-single-file.py"
      - "scrittura-italiana-single-file.md"
      - "scripts/check-description.mjs"
      - ".github/workflows/skill-quality.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Test deterministici del runner
        run: node --test evals/run.test.mjs
      - name: Validazione suite e manifest (zero LLM)
        run: node evals/run.mjs --validate-only
      - name: Lunghezza della description (limite Desktop/claude.ai)
        run: node scripts/check-description.mjs
      - name: Freschezza del single-file (ricostruzione + diff)
        run: |
          python3 build-single-file.py
          git diff --exit-code scrittura-italiana-single-file.md
