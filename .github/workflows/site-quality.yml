name: Site quality

on:
  pull_request:
    paths:
      - "docs/**"
      - "scripts/sync-site.mjs"
      - "SKILL.md"
      - "references/**"
      - "evals/manifest.json"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/sync-site.mjs"
      - "SKILL.md"
      - "references/**"
      - "evals/manifest.json"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check site data and local links
        run: node scripts/sync-site.mjs
      - name: Check progressive-enhancement JavaScript
        run: node --check docs/assets/site.js
